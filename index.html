<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vault">
  
  <link class="apple-touch-icon" rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230A0A0C'/%3E%3Ccircle cx='90' cy='90' r='40' fill='none' stroke='%23D4AF37' stroke-width='8'/%3E%3Cpath d='M90 30 L90 50 M90 130 L90 150 M30 90 L50 90 M130 90 L150 90' stroke='%23D4AF37' stroke-width='8' stroke-linecap='round'/%3E%3Ccircle cx='90' cy='90' r='10' fill='%23D4AF37'/%3E%3C/svg%3E">

  <title>Vault - Personal Tab Edition</title>
  <style>
    :root {
      --bg-main: #0A0A0C;
      --accent-green: #34C759;
      --accent-red: #FF3B30;
      --accent-blue: #0A84FF;
      --text-main: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.45);
      --row-bg: #1C1C1E;
      --input-bg: #2C2C2E;
      --apple-border: rgba(255, 255, 255, 0.06);
      --blur-bg: rgba(15, 15, 17, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.4px;
      user-select: none;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 60px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .profile-circle {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #2C2C2E 0%, #1C1C1E 100%);
      border: 1px solid var(--apple-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      padding: 12px 24px 140px;
    }

    .tab-view {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* CARD 3D Engine */
    .card-perspective {
      perspective: 1200px;
      width: 100%;
      height: 215px;
      margin: 4px 0;
    }

    .n26-card {
      width: 100%;
      height: 100%;
      background: #3A3A3C;
      border-radius: 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.05);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    .card-glare {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 5;
    }

    .card-body-top {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
    }

    .n26-logo {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }
    .n26-logo span { border-top: 2px solid rgba(255, 255, 255, 0.85); padding-top: 1px; }

    .card-chip {
      width: 42px;
      height: 32px;
      background: linear-gradient(135deg, #f0d090 0%, #c5a059 50%, #a37e36 100%);
      border-radius: 6px;
      margin-top: 16px;
    }

    .balance-overlay {
      position: absolute;
      right: 24px;
      top: 45px;
      text-align: right;
    }
    .balance-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }
    .balance-val {
      font-size: 32px;
      font-weight: 700;
      color: #FFFFFF;
      margin-top: 2px;
    }

    .card-bottom-bar {
      height: 56px;
      background: rgba(230, 230, 235, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
    }

    .card-holder-name {
      font-size: 14px;
      font-weight: 500;
      color: #1C1C1E;
      text-transform: uppercase;
    }

    .mastercard-logo {
      display: flex;
      align-items: center;
      position: relative;
      width: 36px;
      height: 22px;
    }
    .mc-circle { width: 22px; height: 22px; border-radius: 50%; position: absolute; }
    .mc-red { background: #EB001B; left: 0; }
    .mc-yellow { background: #FF5F00; right: 0; opacity: 0.9; }

    /* ACTION GRID (SLEEK & CLEAN NO-TEXT EDITION) */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .action-btn {
      border-radius: 22px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      transition: transform 0.1s cubic-bezier(0.1, 0.8, 0.2, 1);
      border: none;
    }
    .action-btn:active { transform: scale(0.90); }

    /* Links: Geld bekommen (Weiß) */
    .action-btn.btn-white {
      background: #FFFFFF;
    }

    /* Rechts: Geld geht weg (Schwarz) */
    .action-btn.btn-black {
      background: #000000;
      border: 0.33px solid var(--apple-border);
    }

    /* LISTS & RELIABLE SWIPING */
    .section-title {
      font-size: 14px;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 700;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transaction-row-wrapper {
      position: relative;
      width: 100%;
      background: transparent; 
      border-radius: 20px;
      overflow: hidden;
      transition: height 0.25s ease, margin 0.25s ease;
    }

    .transaction-row {
      background: var(--row-bg);
      border: 0.33px solid var(--apple-border);
      border-radius: 20px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
      transform: translateX(0px);
      touch-action: pan-y;
      user-select: none;
    }

    .row-action-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1;
      opacity: 0;
      border-radius: 20px;
      pointer-events: none;
    }

    .row-action-overlay svg {
      color: #FFFFFF;
      transition: transform 0.1s ease;
    }

    .trans-info { display: flex; flex-direction: column; gap: 2px; }
    .trans-title { font-size: 16px; font-weight: 600; }
    .trans-meta { font-size: 12px; color: var(--text-secondary); }
    .trans-amount { font-size: 16px; font-weight: 700; }
    .trans-amount.income { color: var(--accent-green); }
    .trans-amount.expense { color: var(--text-main); }

    /* NATIVE BOTTOM TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 88px;
      background: rgba(15, 15, 18, 0.84);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-top: 0.33px solid var(--apple-border);
      display: flex;
      justify-content: space-around;
      padding-top: 10px;
      padding-bottom: 26px;
      z-index: 90;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      width: 90px;
    }

    .tab-item.active { color: var(--text-main); }
    .tab-item svg { width: 24px; height: 24px; stroke: currentColor; }

    /* MODAL SHEETS */
    .modal-sheet {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100vh;
      background: var(--blur-bg);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-top: 0.33px solid var(--apple-border);
      border-radius: 30px 30px 0 0;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.15, 0.85, 0.35, 1);
    }
    .modal-sheet.active { transform: translateY(12%); }

    .modal-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.33px solid var(--apple-border);
    }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-btn { color: #FFFFFF; font-size: 16px; cursor: pointer; }

    .modal-content {
      padding: 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-box {
      background: var(--input-bg);
      border: 0.33px solid var(--apple-border);
      border-radius: 18px;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
    }
    .input-box label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .input-box input, .input-box select {
      background: none; border: none; color: var(--text-main);
      font-size: 17px; font-weight: 500; outline: none; width: 100%;
    }

    .settings-danger-btn {
      background: rgba(255, 59, 48, 0.15);
      border: 0.33px solid rgba(255, 59, 48, 0.3);
      color: var(--accent-red);
      border-radius: 18px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 12px;
    }

    /* ONBOARDING */
    .onboarding-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000000;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 32px;
    }
    .onboarding-overlay.hidden { display: none; }
    .onboarding-brand { text-align: center; margin-bottom: 48px; }
    .onboarding-title { font-size: 34px; font-weight: 800; margin-top: 16px; }
  </style>
</head>
<body>

  <div id="onboarding-screen" class="onboarding-overlay hidden">
    <div class="onboarding-brand">
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width="90" height="90">
        <rect width='180' height='180' rx='40' fill='#1C1C1E' />
        <circle cx='90' cy='90' r='35' fill='none' stroke='#D4AF37' stroke-width='7' />
      </svg>
      <h2 class="onboarding-title">Willkommen bei Vault</h2>
    </div>
    <div class="input-box" style="margin-bottom: 24px; background: #1C1C1E;">
      <label>Dein vollständiger Name</label>
      <input type="text" id="login-username" placeholder="z.B. Max Mustermann">
    </div>
    <button class="action-btn btn-white" style="width: 100%; padding: 18px; aspect-ratio: auto;" onclick="handleLogin()">Einrichten starten</button>
  </div>

  <header>
    <h1 id="app-title-text">Vault</h1>
    <div class="profile-circle" id="profile-initials" onclick="openSettings()">--</div>
  </header>

  <div class="main-content">
    
    <div id="dashboard-view" class="tab-view">
      <div class="card-perspective" id="card-trigger">
        <div class="n26-card" id="3d-card">
          <div class="card-glare" id="card-glare"></div>
          <div class="card-body-top">
            <div class="n26-logo"><span>N</span>26</div>
            <div class="card-chip"></div>
            <div class="balance-overlay">
              <div class="balance-label">Verfügbar</div>
              <div class="balance-val" id="total-balance">0,00 €</div>
            </div>
          </div>
          <div class="card-bottom-bar">
            <div class="card-holder-name" id="card-holder-display">Gast</div>
            <div class="mastercard-logo">
              <div class="mc-circle mc-red"></div>
              <div class="mc-circle mc-yellow"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="action-grid">
        <button class="action-btn btn-white" onclick="openModal('income', false)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        
        <button class="action-btn btn-white" onclick="openModal('income', true)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path><line x1="12" y1="10" x2="12" y2="16"></line><line x1="9" y1="13" x2="15" y2="13"></line></svg>
        </button>
        
        <button class="action-btn btn-black" onclick="openModal('expense', true)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 22v-6h6M2.66 8.43a10 10 0 1 1 .57 8.38l-5.67 5.67"></path><line x1="9" y1="12" x2="15" y2="12"></line></svg>
        </button>
        
        <button class="action-btn btn-black" onclick="openModal('expense', false)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>

      <div>
        <div class="section-title">Kontoaktivitäten</div>
        <div class="transaction-list" id="transaction-container"></div>
      </div>
    </div>

    <div id="recurring-view" class="tab-view" style="display: none;">
      <div>
        <div class="section-title">Aktive Daueraufträge</div>
        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; padding-left: 4px;">
          ← Rechts wischen zum Bearbeiten | Links wischen zum Löschen →
        </div>
        <div class="transaction-list" id="recurring-tab-container"></div>
      </div>
    </div>

  </div>

  <nav class="tab-bar">
    <div class="tab-item active" id="tab-dashboard" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      <span>Dashboard</span>
    </div>
    <div class="tab-item" id="tab-recurring" onclick="switchTab('recurring')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
      <span>Daueraufträge</span>
    </div>
  </nav>

  <div id="transaction-modal" class="modal-sheet">
    <div class="modal-header">
      <span class="modal-btn" onclick="closeModal()">Abbrechen</span>
      <span class="modal-title" id="modal-view-title">Eintrag hinzufügen</span>
      <span class="modal-btn" style="font-weight: 600; color: var(--accent-green);" onclick="saveTransaction()">Fertig</span>
    </div>
    <div class="modal-content">
      <div class="input-box">
        <label>Betrag (€)</label>
        <input type="number" id="input-amount" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="input-box">
        <label>Titel / Verwendungszweck</label>
        <input type="text" id="input-title" placeholder="z.B. Gaming, Snacks...">
      </div>
      <div class="input-box">
        <label>Kategorie</label>
        <select id="input-category">
          <option>Taschengeld</option>
          <option>Gaming & Abo</option>
          <option>Snacks & Essen</option>
          <option>Geschenk</option>
          <option>Kleidung</option>
          <option>Sonstiges</option>
        </select>
      </div>
      <div class="input-box" id="interval-box" style="display: none;">
        <label>Intervall</label>
        <select id="input-interval">
          <option value="monatlich">Monatlich</option>
          <option value="wöchentlich">Wöchentlich</option>
        </select>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal-sheet">
    <div class="modal-header">
      <span class="modal-btn" onclick="closeSettings()">Schließen</span>
      <span class="modal-title">Einstellungen</span>
      <span class="modal-btn" style="font-weight: 600; color: var(--accent-green);" onclick="saveProfileChanges()">Sichern</span>
    </div>
    <div class="modal-content">
      <div class="input-box">
        <label>Name ändern</label>
        <input type="text" id="settings-username-input">
      </div>
      <button class="settings-danger-btn" onclick="handleLogout()" style="margin-top: 24px;">Abmelden</button>
      <button class="settings-danger-btn" style="background: rgba(255,38,38,0.05); border-color: transparent;" onclick="resetAllData()">Alles löschen</button>
    </div>
  </div>

  <script>
    let currentBalance = parseFloat(localStorage.getItem('vault_balance')) || 0.00;
    let transactions = JSON.parse(localStorage.getItem('vault_transactions')) || [];
    let username = localStorage.getItem('vault_username') || "";
    let currentType = 'income';
    let isRecurringMode = false;
    let editingRecurringId = null;

    // Pointer-Gesture State Machine
    let activeRow = null;
    let startX = 0;
    let isDragging = false;

    window.onload = function() {
      checkAuth();
      setup3DEffect();
    };

    function checkAuth() {
      if (!username) {
        document.getElementById('onboarding-screen').classList.remove('hidden');
      } else {
        document.getElementById('onboarding-screen').classList.add('hidden');
        document.getElementById('card-holder-display').innerText = username;
        document.getElementById('profile-initials').innerText = getInitials(username);
        document.getElementById('settings-username-input').value = username;
        checkRecurringOrders();
        updateUI();
        updateRecurringUI();
      }
    }

    function handleLogin() {
      const inputName = document.getElementById('login-username').value.trim();
      if (!inputName) return;
      username = inputName;
      localStorage.setItem('vault_username', username);
      checkAuth();
    }

    function getInitials(name) {
      const parts = name.split(' ');
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return name.substring(0, 2).toUpperCase();
    }

    function switchTab(tabName) {
      const dbView = document.getElementById('dashboard-view');
      const recView = document.getElementById('recurring-view');
      const tabDb = document.getElementById('tab-dashboard');
      const tabRec = document.getElementById('tab-recurring');
      const titleText = document.getElementById('app-title-text');

      if (tabName === 'dashboard') {
        dbView.style.display = 'flex';
        recView.style.display = 'none';
        tabDb.classList.add('active');
        tabRec.classList.remove('active');
        titleText.innerText = "Vault";
        updateUI();
      } else {
        dbView.style.display = 'none';
        recView.style.display = 'flex';
        tabDb.classList.remove('active');
        tabRec.classList.add('active');
        titleText.innerText = "Daueraufträge";
        updateRecurringUI();
      }
    }

    // --- REVOLUTIONARY UNIFIED POINTER SWIPE ENGINE ---
    function pointerDownHandler(e, id, isRecurring) {
      activeRow = e.currentTarget;
      startX = e.clientX;
      isDragging = true;
      
      activeRow.setPointerCapture(e.pointerId);
      activeRow.style.transition = 'none';
      const bg = document.getElementById((isRecurring ? 'rec-bg-' : 'bg-') + id);
      if (bg) bg.style.transition = 'none';
    }

    function pointerMoveHandler(e, id, isRecurring) {
      if (!isDragging || !activeRow) return;
      const diffX = e.clientX - startX;
      
      if (!isRecurring && diffX > 0) return;

      activeRow.style.transform = `translateX(${diffX}px)`;
      
      const bg = document.getElementById((isRecurring ? 'rec-bg-' : 'bg-') + id);
      if (bg) {
        let opacity = Math.min(Math.abs(diffX) / 140, 1);
        bg.style.opacity = opacity;
        
        if (isRecurring) {
          const iconEdit = bg.querySelector('.icon-edit');
          const iconTrash = bg.querySelector('.icon-trash');
          
          if (diffX > 0) {
            bg.style.backgroundColor = 'var(--accent-blue)';
            if (iconEdit) { iconEdit.style.opacity = opacity; iconEdit.style.transform = `scale(${Math.min(0.6 + (diffX/240), 1.1)})`; }
            if (iconTrash) iconTrash.style.opacity = '0';
          } else {
            bg.style.backgroundColor = 'var(--accent-red)';
            if (iconTrash) { iconTrash.style.opacity = opacity; iconTrash.style.transform = `scale(${Math.min(0.6 + (Math.abs(diffX)/240), 1.1)})`; }
            if (iconEdit) iconEdit.style.opacity = '0';
          }
        } else {
          bg.style.backgroundColor = 'var(--accent-red)';
          const trashRight = bg.querySelector('.trash-right');
          if (trashRight) { trashRight.style.opacity = opacity; trashRight.style.transform = `scale(${Math.min(0.6 + (Math.abs(diffX)/240), 1.1)})`; }
        }
      }
    }

    function pointerUpHandler(e, id, isRecurring) {
      if (!isDragging || !activeRow) return;
      isDragging = false;
      const diffX = e.clientX - startX;
      const threshold = 120;
      
      activeRow.releasePointerCapture(e.pointerId);
      activeRow.style.transition = 'transform 0.25s cubic-bezier(0.15, 0.85, 0.35, 1), opacity 0.25s ease';
      
      const bg = document.getElementById((isRecurring ? 'rec-bg-' : 'bg-') + id);
      if (bg) bg.style.transition = 'opacity 0.2s ease';

      if (isRecurring) {
        if (diffX < -threshold) {
          activeRow.style.transform = `translateX(-100%)`;
          activeRow.style.opacity = '0';
          setTimeout(() => { deleteRecurringOrder(id); }, 200);
        } else if (diffX > threshold) {
          activeRow.style.transform = 'translateX(0px)';
          if (bg) bg.style.opacity = '0';
          setTimeout(() => { openEditRecurringModal(id); }, 50);
        } else {
          activeRow.style.transform = 'translateX(0px)';
          if (bg) bg.style.opacity = '0';
        }
      } else {
        if (diffX < -threshold) {
          activeRow.style.transform = `translateX(-100%)`;
          activeRow.style.opacity = '0';
          const wrapper = document.getElementById(`wrapper-${id}`);
          setTimeout(() => {
            if (wrapper) { wrapper.style.height = '0px'; wrapper.style.marginBottom = '0px'; }
            setTimeout(() => { deleteTransaction(id); }, 200);
          }, 50);
        } else {
          activeRow.style.transform = 'translateX(0px)';
          if (bg) bg.style.opacity = '0';
        }
      }
      activeRow = null;
    }

    // --- INTERFACE GENERATION & RENDERING ---
    function updateUI() {
      document.getElementById('total-balance').innerText = formatCurrency(currentBalance);
      const container = document.getElementById('transaction-container');
      container.innerHTML = '';

      if (transactions.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; margin-top: 24px; font-size: 15px;">Noch keine Kontobewegungen.</p>';
        return;
      }

      transactions.forEach(t => {
        const isIncome = t.amount > 0;
        container.innerHTML += `
          <div class="transaction-row-wrapper" id="wrapper-${t.id}" style="height: 72px; margin-bottom: 0px;">
            <div class="transaction-row" id="row-${t.id}" 
                 onpointerdown="pointerDownHandler(event, ${t.id}, false)" 
                 onpointermove="pointerMoveHandler(event, ${t.id}, false)" 
                 onpointerup="pointerUpHandler(event, ${t.id}, false)">
              <div class="row-action-overlay" id="bg-${t.id}">
                <div></div>
                <svg class="trash-right" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </div>
              <div class="trans-info">
                <span class="trans-title">${escapeHtml(t.title)}</span>
                <span class="trans-meta">${t.category} • ${t.date}</span>
              </div>
              <div class="trans-amount ${isIncome ? 'income' : 'expense'}">${isIncome ? '＋ ' : '－ '}${formatCurrency(Math.abs(t.amount))}</div>
            </div>
          </div>
        `;
      });
    }

    function updateRecurringUI() {
      const container = document.getElementById('recurring-tab-container');
      let recurringList = JSON.parse(localStorage.getItem('vault_recurring')) || [];
      container.innerHTML = '';

      if (recurringList.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; margin-top: 24px; font-size: 15px;">Keine aktiven Daueraufträge.</p>';
        return;
      }

      recurringList.forEach(r => {
        const isIncome = r.amount > 0;
        const intervalLabel = r.interval === 'monatlich' ? 'Monatlich' : 'Wöchentlich';
        container.innerHTML += `
          <div class="transaction-row-wrapper" id="rec-wrapper-${r.id}" style="height: 72px;">
            <div class="transaction-row" id="rec-row-${r.id}" 
                 onpointerdown="pointerDownHandler(event, ${r.id}, true)" 
                 onpointermove="pointerMoveHandler(event, ${r.id}, true)" 
                 onpointerup="pointerUpHandler(event, ${r.id}, true)">
              <div class="row-action-overlay" id="rec-bg-${r.id}">
                <svg class="icon-edit" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                <svg class="icon-trash" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </div>
              <div class="trans-info">
                <span class="trans-title">${escapeHtml(r.title)}</span>
                <span class="trans-meta">${r.category} • ${intervalLabel}</span>
              </div>
              <div class="trans-amount ${isIncome ? 'income' : 'expense'}">${isIncome ? '＋ ' : '－ '}${formatCurrency(Math.abs(r.amount))}</div>
            </div>
          </div>
        `;
      });
    }

    // --- TRANSACTION CREATION & MUTATION MANAGEMENT ---
    function openModal(type, recurring = false) {
      currentType = type;
      isRecurringMode = recurring;
      editingRecurringId = null;
      
      if (recurring) {
        document.getElementById('modal-view-title').innerText = type === 'income' ? 'Dauerauftrag Einnahme' : 'Dauerauftrag Ausgabe';
        document.getElementById('interval-box').style.display = 'flex';
      } else {
        document.getElementById('modal-view-title').innerText = type === 'income' ? 'Einnahme buchen' : 'Ausgabe buchen';
        document.getElementById('interval-box').style.display = 'none';
      }

      document.getElementById('input-amount').value = '';
      document.getElementById('input-title').value = '';
      document.getElementById('transaction-modal').classList.add('active');
    }

    function openEditRecurringModal(id) {
      let recurringList = JSON.parse(localStorage.getItem('vault_recurring')) || [];
      const order = recurringList.find(r => r.id === id);
      if (!order) return;

      editingRecurringId = id;
      isRecurringMode = true;
      currentType = order.amount > 0 ? 'income' : 'expense';

      document.getElementById('modal-view-title').innerText = 'Dauerauftrag bearbeiten';
      document.getElementById('interval-box').style.display = 'flex';
      
      document.getElementById('input-amount').value = Math.abs(order.amount).toFixed(2);
      document.getElementById('input-title').value = order.title;
      document.getElementById('input-category').value = order.category;
      document.getElementById('input-interval').value = order.interval;

      document.getElementById('transaction-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('transaction-modal').classList.remove('active');
      editingRecurringId = null;
    }

    function saveTransaction() {
      const amountStr = document.getElementById('input-amount').value;
      const titleStr = document.getElementById('input-title').value.trim();
      const categoryStr = document.getElementById('input-category').value;

      if (!amountStr || parseFloat(amountStr) <= 0 || !titleStr) {
        alert('Bitte gib einen gültigen Betrag und Verwendungszweck ein.');
        return;
      }

      let amount = parseFloat(amountStr);
      if (currentType === 'expense') amount = -amount;

      let recurringList = JSON.parse(localStorage.getItem('vault_recurring')) || [];

      if (editingRecurringId !== null) {
        const idx = recurringList.findIndex(r => r.id === editingRecurringId);
        if (idx !== -1) {
          recurringList[idx].title = titleStr;
          recurringList[idx].category = categoryStr;
          recurringList[idx].amount = amount;
          recurringList[idx].interval = document.getElementById('input-interval').value;
        }
        localStorage.setItem('vault_recurring', JSON.stringify(recurringList));
        editingRecurringId = null;
      } else if (isRecurringMode) {
        const interval = document.getElementById('input-interval').value;
        let nextExecDate = new Date();
        interval === 'monatlich' ? nextExecDate.setMonth(nextExecDate.getMonth() + 1) : nextExecDate.setDate(nextExecDate.getDate() + 7);

        const newRecurring = {
          id: Date.now(), title: titleStr, category: categoryStr, amount: amount, interval: interval, nextDate: nextExecDate.toISOString()
        };
        recurringList.push(newRecurring);
        localStorage.setItem('vault_recurring', JSON.stringify(recurringList));

        const initialTx = {
          id: Date.now() + 1, title: titleStr + " (Dauerauftrag)", category: categoryStr, amount: amount,
          date: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })
        };
        transactions.unshift(initialTx);
        currentBalance += amount;
      } else {
        const newTransaction = {
          id: Date.now(), title: titleStr, category: categoryStr, amount: amount,
          date: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })
        };
        transactions.unshift(newTransaction);
        currentBalance += amount;
      }

      saveToStorage();
      updateUI();
      updateRecurringUI();
      closeModal();
    }

    function checkRecurringOrders() {
      let recurringList = JSON.parse(localStorage.getItem('vault_recurring')) || [];
      let updated = false;
      const now = new Date();

      recurringList.forEach(order => {
        if (!order.nextDate) return;
        let nextExecution = new Date(order.nextDate);

        while (now >= nextExecution) {
          const automatedTx = {
            id: Date.now() + Math.random(),
            title: order.title + " (Dauerauftrag)",
            category: order.category,
            amount: order.amount,
            date: nextExecution.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })
          };

          transactions.unshift(automatedTx);
          currentBalance += order.amount;

          if (order.interval === 'monatlich') {
            nextExecution.setMonth(nextExecution.getMonth() + 1);
          } else if (order.interval === 'wöchentlich') {
            nextExecution.setDate(nextExecution.getDate() + 7);
          }
          order.nextDate = nextExecution.toISOString();
          updated = true;
        }
      });

      if (updated) {
        saveToStorage();
        localStorage.setItem('vault_recurring', JSON.stringify(recurringList));
      }
    }

    function deleteTransaction(id) {
      const idx = transactions.findIndex(t => t.id === id);
      if (idx !== -1) {
        currentBalance -= transactions[idx].amount;
        transactions.splice(idx, 1);
        saveToStorage();
        updateUI();
      }
    }

    function deleteRecurringOrder(id) {
      let recurringList = JSON.parse(localStorage.getItem('vault_recurring')) || [];
      recurringList = recurringList.filter(r => r.id !== id);
      localStorage.setItem('vault_recurring', JSON.stringify(recurringList));
      updateRecurringUI();
    }

    function saveToStorage() {
      localStorage.setItem('vault_balance', currentBalance.toFixed(2));
      localStorage.setItem('vault_transactions', JSON.stringify(transactions));
    }

    function formatCurrency(val) {
      return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(val);
    }

    // --- 3D INTERACTIVE GYRO CARD ENGINE ---
    function setup3DEffect() {
      const trigger = document.getElementById('card-trigger');
      const card = document.getElementById('3d-card');
      const glare = document.getElementById('card-glare');

      const handleMove = (e) => {
        if (document.getElementById('dashboard-view').style.display === 'none') return;
        const rect = trigger.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const midX = rect.width / 2;
        const midY = rect.height / 2;

        const rotateX = ((midY - y) / midY) * 12;
        const rotateY = ((x - midX) / midX) * 12;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        glare.style.background = `radial-gradient(circle at ${(x / rect.width) * 100}% ${(y / rect.height) * 100}%, rgba(255,255,255,0.2) 0%, transparent 60%)`;
      };

      const handleReset = () => {
        card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        glare.style.background = `linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%)`;
      };

      trigger.addEventListener('mousemove', handleMove);
      trigger.addEventListener('mouseleave', handleReset);
      trigger.addEventListener('touchmove', handleMove, { passive: true });
      trigger.addEventListener('touchend', handleReset);
    }

    function openSettings() {
      document.getElementById('settings-username-input').value = username;
      document.getElementById('settings-modal').classList.add('active');
    }
    function closeSettings() { document.getElementById('settings-modal').classList.remove('active'); }
    function saveProfileChanges() {
      const updatedName = document.getElementById('settings-username-input').value.trim();
      if (!updatedName) return;
      username = updatedName;
      localStorage.setItem('vault_username', username);
      checkAuth();
      closeSettings();
    }
    function handleLogout() {
      if(confirm('Abmelden? Deine Daten bleiben lokal gespeichert.')) {
        username = ""; localStorage.removeItem('vault_username'); closeSettings(); checkAuth();
      }
    }
    function resetAllData() {
      if(confirm('App-Daten unwiderruflich löschen?')) {
        localStorage.clear(); currentBalance = 0.00; transactions = []; username = ""; closeSettings(); checkAuth();
      }
    }
    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
