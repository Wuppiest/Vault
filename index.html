<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vault">
  
  <link class="apple-touch-icon" rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230A0A0C'/%3E%3Ccircle cx='90' cy='90' r='40' fill='none' stroke='%23D4AF37' stroke-width='8'/%3E%3Cpath d='M90 30 L90 50 M90 130 L90 150 M30 90 L50 90 M130 90 L150 90' stroke='%23D4AF37' stroke-width='8' stroke-linecap='round'/%3E%3Ccircle cx='90' cy='90' r='12' fill='%23D4AF37'/%3E%3C/svg%3E">
  
  <style>
    :root {
      --bg-main: #0A0A0C;
      --card-bg: rgba(25, 25, 30, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #D4AF37;
      --accent-rgb: 212, 175, 55;
      --text: #FFFFFF;
      --text-dim: #8E8E93;
      --success: #30D158;
      --error: #FF453A;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    
    body {
      background-color: var(--bg-main);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    .phone-frame {
      width: 100%;
      max-width: 412px;
      height: 100vh;
      max-height: 892px;
      background: var(--bg-main);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    @media (min-width: 420px) {
      .phone-frame {
        height: 844px;
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        border: 8px solid #1C1C1E;
      }
    }

    /* Screen Views */
    .view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px 24px 40px 24px;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Header Nav */
    .nav-header {
      position: absolute;
      top: 40px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      height: 44px;
    }

    /* Runder Zurück Button oben links */
    .circle-back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: background 0.2s, transform 0.1s;
    }
    .circle-back-btn:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.1);
    }

    /* Face ID View Layout */
    #auth-view {
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .auth-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 40px;
    }

    /* Apple Face ID SVG & Animationen */
    .faceid-glyph-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .faceid-svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: var(--accent);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
    }

    .faceid-glyph-wrapper.scanning {
      animation: faceIdPulse 0.6s infinite alternate ease-in-out;
    }
    
    .faceid-glyph-wrapper.error-shake {
      animation: faceIdShake 0.4s ease-in-out;
    }

    @keyframes faceIdPulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes faceIdShake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-10px); }
      40%, 80% { transform: translateX(10px); }
    }

    .auth-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
    }

    .auth-status {
      font-size: 15px;
      color: var(--text-dim);
      text-align: center;
      height: 20px;
    }

    /* Code Eingabe (Passcode Fallback) */
    .passcode-box {
      position: absolute;
      top: 140px;
      left: 24px;
      right: 24px;
      bottom: 140px;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20;
    }
    .passcode-box.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .passcode-dots {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }
    .passcode-dot {
      width: 13px;
      height: 13px;
      border: 2px solid var(--text-dim);
      border-radius: 50%;
      transition: all 0.1s;
    }
    .passcode-dot.filled {
      background: var(--text);
      border-color: var(--text);
      transform: scale(1.1);
    }

    .passcode-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px 28px;
      justify-items: center;
    }
    .key-btn {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.02);
      color: var(--text);
      font-size: 28px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .key-btn:active {
      background: rgba(255,255,255,0.15);
    }
    .key-btn.empty {
      background: transparent;
      border: none;
      cursor: default;
    }
    .key-btn.text-action {
      background: transparent;
      border: none;
      font-size: 14px;
      color: var(--text-dim);
    }
    .key-btn.text-action:active {
      color: var(--text);
    }

    /* RIESIGER FORTFAHREN BUTTON UNTEN */
    .bottom-container {
      width: 100%;
      padding-bottom: 12px;
      z-index: 30;
    }

    .huge-btn {
      width: 100%;
      height: 56px;
      background: var(--accent);
      color: #000000;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background 0.3s, transform 0.1s;
    }
    .huge-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
    .huge-btn:disabled {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-dim);
      cursor: not-allowed;
      transform: none;
    }

    /* Dashboard & Cards Layout */
    #dashboard-view {
      padding-top: 50px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #dashboard-view::-webkit-scrollbar { display: none; }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .profile-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37, #AA7C11);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #000;
    }
    .welcome-text p {
      font-size: 13px;
      color: var(--text-dim);
    }
    .welcome-text h2 {
      font-size: 17px;
      font-weight: 600;
    }
    
    /* 3D Kreditkarte */
    .card-trigger {
      perspective: 1000px;
      margin-bottom: 28px;
      width: 100%;
    }
    .credit-card {
      width: 100%;
      aspect-ratio: 1.586/1;
      background: linear-gradient(135deg, #1A1A1E 0%, #0D0D10 100%);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .card-glare {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 2;
    }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }
    .card-chip {
      width: 40px;
      height: 30px;
      background: linear-gradient(135deg, #B392AC, #63535B);
      border-radius: 6px;
      opacity: 0.7;
    }
    .card-middle {
      z-index: 2;
    }
    .balance-display {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 2;
    }
    .card-number {
      font-family: monospace;
      font-size: 15px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.7);
    }
    
    /* Quick Actions */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .action-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: background 0.2s;
    }
    .action-item:active .action-icon {
      background: rgba(255,255,255,0.08);
    }
    .action-item span {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Transactions */
    .tx-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .section-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title span {
      font-size: 13px;
      color: var(--accent);
      font-weight: 400;
      cursor: pointer;
    }
    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 20px;
    }
    .tx-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tx-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tx-icon-box {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .tx-info h4 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .tx-info p {
      font-size: 12px;
      color: var(--text-dim);
    }
    .tx-amount {
      font-size: 16px;
      font-weight: 600;
    }
    .tx-amount.positive { color: var(--success); }
    .tx-amount.negative { color: var(--text); }

    /* Modal / Sheets */
    .sheet-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
    }
    .sheet-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .bottom-sheet {
      width: 100%;
      background: #121214;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border-top: 1px solid var(--card-border);
      padding: 24px 24px 44px 24px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sheet-overlay.active .bottom-sheet {
      transform: translateY(0);
    }
    .sheet-handle {
      width: 36px;
      height: 5px;
      background: rgba(255,255,255,0.2);
      border-radius: 2.5px;
      margin: -12px auto 20px auto;
    }
    .sheet-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .input-field {
      width: 100%;
      height: 50px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text);
      padding: 0 16px;
      font-size: 16px;
      outline: none;
    }
    .input-field:focus {
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    
    <div class="view" id="auth-view">
      <div class="nav-header">
        <button class="circle-back-btn" onclick="resetAuthProcess()" aria-label="Zurück">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <div></div>
      </div>

      <div class="auth-center" id="auth-main-panel">
        <div class="faceid-glyph-wrapper" id="faceid-node">
          <svg class="faceid-svg" id="faceid-svg-element" viewBox="0 0 100 100">
            <path d="M 25 10 L 15 10 A 5 5 0 0 0 10 15 L 10 25" />
            <path d="M 75 10 L 85 10 A 5 5 0 0 1 90 15 L 90 25" />
            <path d="M 10 75 L 10 85 A 5 5 0 0 0 15 90 L 25 90" />
            <path d="M 90 75 L 90 85 A 5 5 0 0 1 85 90 L 75 90" />
            
            <g class="face-lines" id="faceid-features">
              <line x1="34" y1="42" x2="42" y2="42" />
              <line x1="58" y1="42" x2="66" y2="42" />
              <path d="M 50 39 L 50 58 L 44 58" />
              <path d="M 36 71 Q 50 78 64 71" />
            </g>
            
            <path id="faceid-checkmark" d="M 32 52 L 46 66 L 70 36" style="display: none; stroke-dasharray: 100; stroke-dashoffset: 100;" />
            <g id="faceid-cross" style="display: none;">
              <line x1="36" y1="36" x2="64" y2="64" />
              <line x1="64" y1="36" x2="36" y2="64" />
            </g>
          </svg>
        </div>
        <h1 class="auth-title" id="auth-main-title">Vault entsperren</h1>
        <p class="auth-status" id="auth-status-msg">Tippe auf Fortfahren, um den Scan zu starten</p>
      </div>

      <div class="passcode-box" id="passcode-node">
        <div style="font-size: 20px; font-weight: 500; margin-bottom: 28px; letter-spacing: -0.3px;">Code eingeben</div>
        <div class="passcode-dots">
          <div class="passcode-dot"></div>
          <div class="passcode-dot"></div>
          <div class="passcode-dot"></div>
          <div class="passcode-dot"></div>
        </div>
        <div class="passcode-keypad">
          <button class="key-btn" onclick="typePin(1)">1</button>
          <button class="key-btn" onclick="typePin(2)">2</button>
          <button class="key-btn" onclick="typePin(3)">3</button>
          <button class="key-btn" onclick="typePin(4)">4</button>
          <button class="key-btn" onclick="typePin(5)">5</button>
          <button class="key-btn" onclick="typePin(6)">6</button>
          <button class="key-btn" onclick="typePin(7)">7</button>
          <button class="key-btn" onclick="typePin(8)">8</button>
          <button class="key-btn" onclick="typePin(9)">9</button>
          <button class="key-btn empty"></button>
          <button class="key-btn" onclick="typePin(0)">0</button>
          <button class="key-btn text-action" onclick="deletePin()">Löschen</button>
        </div>
      </div>

      <div class="bottom-container">
        <button class="huge-btn" id="auth-action-btn" onclick="processAuthTrigger()">
          Fortfahren
        </button>
      </div>
    </div>


    <div class="view" id="dashboard-view" style="display: none; opacity: 0; transform: translateY(20px);">
      <div class="dash-header">
        <div class="profile-section">
          <div class="avatar">U</div>
          <div class="welcome-text">
            <p>Willkommen zurück</p>
            <h2>User Account</h2>
          </div>
        </div>
        <button class="circle-back-btn" onclick="lockApp()" aria-label="Sperren">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </button>
      </div>

      <div class="card-trigger" id="card-3d-trigger">
        <div class="credit-card" id="3d-card">
          <div class="card-glare" id="card-glare"></div>
          <div class="card-top">
            <span class="card-label">Hauptkonto</span>
            <div class="card-chip"></div>
          </div>
          <div class="card-middle">
            <div class="balance-display" id="total-balance-view">438,50 €</div>
          </div>
          <div class="card-bottom">
            <span class="card-number">•••• •••• •••• 7026</span>
            <span class="card-label" style="font-size: 9px;">Under 18 Space</span>
          </div>
        </div>
      </div>

      <div class="actions-grid">
        <div class="action-item" onclick="openSheet('send')">
          <div class="action-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </div>
          <span>Senden</span>
        </div>
        <div class="action-item" onclick="openSheet('receive')">
          <div class="action-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
          </div>
          <span>Empfangen</span>
        </div>
        <div class="action-item" onclick="alert('Statistiken kommen bald!')">
          <div class="action-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
          </div>
          <span>Analyse</span>
        </div>
        <div class="action-item" onclick="alert('Karten-Einstellungen kommen bald!')">
          <div class="action-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="2" y1="10" x2="22" y2="10"></line>
            </svg>
          </div>
          <span>Karte</span>
        </div>
      </div>

      <div class="tx-section">
        <div class="section-title">
          <h3>Aktivitäten</h3>
          <span onclick="alert('Verlauf wird geladen...')">Alle anzeigen</span>
        </div>
        <div class="tx-list" id="transaction-history-box">
          </div>
      </div>
    </div>

    <div class="sheet-overlay" id="sheet-backdrop" onclick="closeSheet()">
      <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title" id="sheet-headline">Transaktion</h3>
        
        <div id="sheet-form-content">
          </div>
        
        <button class="huge-btn" style="margin-top: 12px;" onclick="executeSheetAction()">Bestätigen</button>
      </div>
    </div>

  </div>

  <script>
    // State Management
    let state = {
      balance: 438.50,
      pinCode: "1234",
      inputPin: "",
      authPassed: false,
      activeSheet: null,
      transactions: [
        { id: 1, title: "Spotify Premium", description: "Abonnement", amount: -10.99, icon: "🎵", date: "Heute" },
        { id: 2, title: "Oma Taschengeld", description: "Überweisung", amount: 50.00, icon: "💰", date: "Gestern" },
        { id: 3, title: "Dönerladen Berlin", description: "Kartenzahlung", amount: -7.50, icon: "🥙", date: "3. Juni" },
        { id: 4, title: "PlayStation Network", description: "Guthaben", amount: -25.00, icon: "🎮", date: "1. Juni" }
      ]
    };

    // DOM References
    const authView = document.getElementById('auth-view');
    const dashboardView = document.getElementById('dashboard-view');
    const faceidNode = document.getElementById('faceid-node');
    const faceidSvg = document.getElementById('faceid-svg-element');
    const faceidFeatures = document.getElementById('faceid-features');
    const checkmarkPath = document.getElementById('faceid-checkmark');
    const crossPath = document.getElementById('faceid-cross');
    const authStatusMsg = document.getElementById('auth-status-msg');
    const authActionBtn = document.getElementById('auth-action-btn');
    const passcodeNode = document.getElementById('passcode-node');
    const passcodeDots = document.querySelectorAll('.passcode-dot');
    const txHistoryBox = document.getElementById('transaction-history-box');
    const totalBalanceView = document.getElementById('total-balance-view');
    
    // Sheet Elements
    const sheetBackdrop = document.getElementById('sheet-backdrop');
    const sheetHeadline = document.getElementById('sheet-headline');
    const sheetFormContent = document.getElementById('sheet-form-content');

    // Init App
    window.addEventListener('DOMContentLoaded', () => {
      renderTransactions();
    });

    // Face ID Authentifizierungsprozess (Exakt 0.8s und 30% Fehlerquote)
    function processAuthTrigger() {
      if (state.authPassed) {
        showDashboard();
        return;
      }

      // Scan-Animation starten
      faceidNode.className = "faceid-glyph-wrapper scanning";
      faceidSvg.style.stroke = "var(--accent)";
      faceidFeatures.style.display = "block";
      checkmarkPath.style.display = "none";
      crossPath.style.display = "none";
      authStatusMsg.textContent = "Gesicht wird gescannt...";
      authActionBtn.disabled = true;

      // Beschleunigter Scan: Braucht exakt 0.8 Sekunden
      setTimeout(() => {
        faceidNode.classList.remove('scanning');
        
        // 30% Fehlerquote (Zufallswert unter 0.3 bedeutet Fehlschlag)
        const scanSuccess = Math.random() >= 0.3;

        if (scanSuccess) {
          // Erfolg
          faceidSvg.style.stroke = "var(--success)";
          faceidFeatures.style.display = "none";
          checkmarkPath.style.display = "block";
          
          checkmarkPath.style.animation = "none";
          setTimeout(() => {
            checkmarkPath.style.strokeDashoffset = "0";
            checkmarkPath.style.transition = "stroke-dashoffset 0.25s ease-out";
          }, 10);

          authStatusMsg.textContent = "Erfolgreich erkannt";
          authStatusMsg.style.color = "var(--success)";
          state.authPassed = true;
          
          authActionBtn.disabled = false;
          authActionBtn.textContent = "Fortfahren";
          
          // Sofortiger automatischer Übergang ins Dashboard für ein flüssiges Erlebnis
          setTimeout(showDashboard, 300);
        } else {
          // Fehlschlag
          faceidNode.classList.add('error-shake');
          faceidSvg.style.stroke = "var(--error)";
          faceidFeatures.style.display = "none";
          crossPath.style.display = "block";
          authStatusMsg.textContent = "Nicht erkannt";
          authStatusMsg.style.color = "var(--error)";

          // Nach der Schüttel-Animation direkt die Code-Eingabe einblenden
          setTimeout(() => {
            faceidNode.classList.remove('error-shake');
            openPasscodeBox();
          }, 400);
        }
      }, 800);
    }

    // Code-Eingabe Modus aktivieren
    function openPasscodeBox() {
      authStatusMsg.textContent = "Verwende deinen Geräte-Code";
      authStatusMsg.style.color = "var(--text-dim)";
      passcodeNode.classList.add('active');
      authActionBtn.style.display = "none"; // Ausblenden während Code-Eingabe
    }

    function typePin(digit) {
      if (state.inputPin.length < 4) {
        state.inputPin += digit;
        updatePinDots();
      }

      if (state.inputPin.length === 4) {
        setTimeout(() => {
          if (state.inputPin === state.pinCode) {
            // PIN korrekt
            passcodeNode.classList.remove('active');
            authActionBtn.style.display = "block";
            
            faceidSvg.style.stroke = "var(--success)";
            crossPath.style.display = "none";
            checkmarkPath.style.display = "block";
            checkmarkPath.style.strokeDashoffset = "0";
            
            authStatusMsg.textContent = "Code akzeptiert";
            authStatusMsg.style.color = "var(--success)";
            state.authPassed = true;
            authActionBtn.disabled = false;
            
            // Fluid weiterleiten
            showDashboard();
          } else {
            // PIN falsch
            state.inputPin = "";
            updatePinDots();
            authStatusMsg.textContent = "Falscher Code! Erneut versuchen.";
            authStatusMsg.style.color = "var(--error)";
            
            // Visuelles Feedback: Dots schütteln
            passcodeNode.style.animation = "faceIdShake 0.3s ease";
            setTimeout(() => { passcodeNode.style.animation = ""; }, 300);
          }
        }, 200);
      }
    }

    function deletePin() {
      state.inputPin = state.inputPin.slice(0, -1);
      updatePinDots();
    }

    function updatePinDots() {
      passcodeDots.forEach((dot, idx) => {
        if (idx < state.inputPin.length) {
          dot.classList.add('filled');
        } else {
          dot.classList.remove('filled');
        }
      });
    }

    // Vollständiger Reset der Login-Ansicht
    function resetAuthProcess() {
      state.inputPin = "";
      state.authPassed = false;
      updatePinDots();
      passcodeNode.classList.remove('active');
      authActionBtn.style.display = "block";
      authActionBtn.disabled = false;
      authActionBtn.textContent = "Fortfahren";
      
      faceidNode.className = "faceid-glyph-wrapper";
      faceidSvg.style.stroke = "var(--accent)";
      faceidFeatures.style.display = "block";
      checkmarkPath.style.display = "none";
      crossPath.style.display = "none";
      authStatusMsg.textContent = "Tippe auf Fortfahren, um den Scan zu starten";
      authStatusMsg.style.color = "var(--text-dim)";
    }

    // Navigation zum Dashboard
    function showDashboard() {
      authView.style.opacity = "0";
      authView.style.transform = "scale(0.95)";
      setTimeout(() => {
        authView.style.display = "none";
        dashboardView.style.display = "flex";
        setTimeout(() => {
          dashboardView.style.opacity = "1";
          dashboardView.style.transform = "translateY(0)";
        }, 50);
      }, 400);
    }

    // App sperren (Zurück ins Login)
    function lockApp() {
      dashboardView.style.opacity = "0";
      dashboardView.style.transform = "translateY(20px)";
      setTimeout(() => {
        dashboardView.style.display = "none";
        authView.style.display = "flex";
        resetAuthProcess();
        setTimeout(() => {
          authView.style.opacity = "1";
          authView.style.transform = "scale(1)";
        }, 50);
      }, 400);
    }

    // Transaktionen rendern
    function renderTransactions() {
      txHistoryBox.innerHTML = "";
      state.transactions.forEach(tx => {
        const isPos = tx.amount > 0;
        const card = document.createElement('div');
        card.className = "tx-card";
        card.innerHTML = `
          <div class="tx-left">
            <div class="tx-icon-box">${tx.icon}</div>
            <div class="tx-info">
              <h4>${tx.title}</h4>
              <p>${tx.description} • ${tx.date}</p>
            </div>
          </div>
          <div class="tx-amount ${isPos ? 'positive' : 'negative'}">
            ${isPos ? '+' : ''}${tx.amount.toFixed(2).replace('.', ',')} €
          </div>
        `;
        txHistoryBox.appendChild(card);
      });
      totalBalanceView.textContent = `${state.balance.toFixed(2).replace('.', ',')} €`;
    }

    // Sheets Öffnen & Schließen
    function openSheet(type) {
      state.activeSheet = type;
      sheetBackdrop.classList.add('active');
      
      if (type === 'send') {
        sheetHeadline.textContent = "Geld senden";
        sheetFormContent.innerHTML = `
          <div class="input-group">
            <label>Empfänger (Name oder IBAN)</label>
            <input type="text" class="input-field" id="sheet-tx-target" placeholder="z.B. Max Mustermann">
          </div>
          <div class="input-group">
            <label>Betrag (€)</label>
            <input type="number" step="0.01" class="input-field" id="sheet-tx-amount" placeholder="0,00">
          </div>
          <div class="input-group">
            <label>Verwendungszweck</label>
            <input type="text" class="input-field" id="sheet-tx-desc" placeholder="Optional">
          </div>
        `;
      } else if (type === 'receive') {
        sheetHeadline.textContent = "Geld anfordern";
        sheetFormContent.innerHTML = `
          <div class="input-group">
            <label>Betrag (€)</label>
            <input type="number" step="0.01" class="input-field" id="sheet-tx-amount" placeholder="0,00">
          </div>
          <div class="input-group">
            <label>Nachricht für den Zahler</label>
            <input type="text" class="input-field" id="sheet-tx-desc" placeholder="z.B. Kinoticket">
          </div>
        `;
      }
    }

    function closeSheet() {
      sheetBackdrop.classList.remove('active');
      state.activeSheet = null;
    }

    function executeSheetAction() {
      const amountEl = document.getElementById('sheet-tx-amount');
      const descEl = document.getElementById('sheet-tx-desc');
      const targetEl = document.getElementById('sheet-tx-target');
      
      if (!amountEl || !amountEl.value || parseFloat(amountEl.value) <= 0) {
        alert("Bitte gib einen gültigen Betrag ein.");
        return;
      }
      
      const val = parseFloat(amountEl.value);
      const description = descEl && descEl.value ? descEl.value : "Überweisung";
      
      if (state.activeSheet === 'send') {
        if (val > state.balance) {
          alert("Guthaben nicht ausreichend!");
          return;
        }
        const name = targetEl && targetEl.value ? targetEl.value : "Unbekannt";
        state.balance -= val;
        state.transactions.unshift({
          id: Date.now(),
          title: name,
          description: description,
          amount: -val,
          icon: "💸",
          date: "Heute"
        });
      } else if (state.activeSheet === 'receive') {
        state.balance += val;
        state.transactions.unshift({
          id: Date.now(),
          title: "Geldeingang",
          description: description,
          amount: val,
          icon: "📥",
          date: "Heute"
        });
      }
      
      renderTransactions();
      closeSheet();
    }

    // 3D Kreditkarten Interaktion (Maus & Touch)
    const trigger = document.getElementById('card-3d-trigger');
    const card = document.getElementById('3d-card');
    const glare = document.getElementById('card-glare');
    
    const handleMove = (e) => {
      if (dashboardView.style.display === 'none') return;
      const rect = trigger.getBoundingClientRect();
      let clientX = e.touches ? e.touches[0].clientX : e.clientX;
      let clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const midX = rect.width / 2;
      const midY = rect.height / 2;
      
      const rotateX = ((midY - y) / midY) * 12;
      const rotateY = ((x - midX) / midX) * 12;
      
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      glare.style.background = `radial-gradient(circle at ${(x / rect.width) * 100}% ${(y / rect.height) * 100}%, rgba(255,255,255,0.12) 0%, transparent 65%)`;
    };
    
    const handleReset = () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
      glare.style.background = `linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%)`;
    };
    
    trigger.addEventListener('mousemove', handleMove);
    trigger.addEventListener('mouseleave', handleReset);
    trigger.addEventListener('touchmove', handleMove);
    trigger.addEventListener('touchend', handleReset);
  </script>

</body>
</html>
